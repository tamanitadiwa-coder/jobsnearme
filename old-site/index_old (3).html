<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Location — StoresNearm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #0a0a0a; --white: #fafaf8; --gray: #6b6b6b;
    --light: #f0efeb; --border: #e0dfd9; --radius: 14px;
    --font-body: 'DM Sans', sans-serif;
    --transition: 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  html { height: 100%; }
  body {
    min-height: 100%; font-family: var(--font-body);
    background: var(--white); color: var(--black);
    -webkit-font-smoothing: antialiased;
    opacity: 0; transition: opacity var(--transition);
  }
  body.visible { opacity: 1; }
  body.out { opacity: 0; }

  .topbar {
    position: sticky; top: 0; z-index: 10;
    background: rgba(250,250,248,0.95); backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px; display: flex; align-items: center; gap: 14px;
  }
  .back-btn {
    background: none; border: 1px solid var(--border); border-radius: 100px;
    padding: 7px 14px 7px 10px; font-family: var(--font-body); font-size: 13px;
    cursor: pointer; display: flex; align-items: center; gap: 4px;
    color: var(--black); transition: background 0.15s;
    white-space: nowrap; flex-shrink: 0;
  }
  .back-btn:active { background: var(--light); }
  .topbar-title { font-size: 15px; font-weight: 500; color: var(--black); }

  /* GPS card */
  .gps-card {
    margin: 14px 16px 0; border-radius: var(--radius);
    border: 1px solid var(--border); overflow: hidden;
  }
  .gps-detecting {
    padding: 15px 16px; display: flex; align-items: center;
    gap: 12px; background: var(--light);
  }
  .spinner {
    width: 18px; height: 18px; flex-shrink: 0;
    border: 2px solid var(--border); border-top-color: var(--black);
    border-radius: 50%; animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .gps-detecting span { font-size: 13px; color: var(--gray); }

  .gps-found {
    display: none; padding: 14px 16px; background: var(--white);
    cursor: pointer; transition: background 0.12s;
  }
  .gps-found:active { background: var(--light); }
  .gps-found-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
  .gps-tag {
    font-size: 10px; font-weight: 500; letter-spacing: 0.08em;
    text-transform: uppercase; color: #a0a09a;
    display: flex; align-items: center; gap: 5px;
  }
  .use-btn {
    background: var(--black); color: var(--white); border: none;
    border-radius: 100px; padding: 5px 13px; font-size: 12px;
    font-weight: 500; font-family: var(--font-body); cursor: pointer;
  }
  .gps-city-name { font-size: 17px; font-weight: 500; color: var(--black); }
  .gps-country { font-size: 12px; color: var(--gray); margin-top: 1px; }

  .gps-error {
    display: none; padding: 13px 16px; background: #fffbf0;
    border-top: 1px solid #f0e8c0;
  }
  .gps-error span { font-size: 13px; color: #7a6200; }

  /* Nearby row */
  .nearby-wrap { display: none; }

  /* Search */
  .search-wrap { padding: 14px 16px 0; }
  .search-input {
    width: 100%; padding: 12px 16px;
    border: 1px solid var(--border); border-radius: var(--radius);
    font-family: var(--font-body); font-size: 14px;
    background: var(--light); color: var(--black); outline: none;
    transition: border-color 0.2s;
  }
  .search-input::placeholder { color: #a0a09a; }
  .search-input:focus { border-color: var(--black); background: var(--white); }

  /* Lists */
  .content { padding: 8px 0 60px; }
  .section-label {
    padding: 20px 20px 8px; font-size: 11px; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase; color: #a0a09a;
  }
  .loc-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.12s; background: var(--white);
  }
  .loc-item:last-child { border-bottom: none; }
  .loc-item:active { background: var(--light); }
  .loc-name { font-size: 15px; color: var(--black); }
  .loc-meta { font-size: 12px; color: #a0a09a; }
  .loc-arrow { color: #b0b0a8; font-size: 16px; flex-shrink: 0; }

  .no-results {
    padding: 40px 20px; text-align: center;
    color: var(--gray); font-size: 14px; display: none;
  }
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="goBack()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
      <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
    </svg>
    Back
  </button>
  <span class="topbar-title">Select location</span>
</div>

<!-- GPS detection card -->
<div class="gps-card">
  <div class="gps-detecting" id="gpsDetecting">
    <div class="spinner"></div>
    <span>Detecting your location…</span>
  </div>
  <div class="gps-found" id="gpsFound" onclick="confirmGPS()">
    <div class="gps-found-row">
      <span class="gps-tag">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
        Your location
      </span>
      <button class="use-btn" onclick="confirmGPS(); event.stopPropagation()">Use this</button>
    </div>
    <div class="gps-city-name" id="gpsCityName"></div>
    <div class="gps-country" id="gpsCountry"></div>
  </div>
  <div class="gps-error" id="gpsError">
    <span>Location access denied — search below or pick from the list.</span>
  </div>
</div>

<!-- Nearby cities (populated after GPS) -->
<div class="nearby-wrap" id="nearbyWrap">
  <div class="section-label">Nearby areas</div>
  <div id="nearbyList"></div>
</div>

<!-- Search -->
<div class="search-wrap">
  <input class="search-input" id="searchInput" type="text"
    placeholder="Search any city worldwide…" oninput="filterLocations(this.value)">
</div>

<div class="content" id="content"></div>
<div class="no-results" id="noResults">No locations found</div>

<script>
  const API_KEY = localStorage.getItem('sn_api_key') || 'YOUR_GOOGLE_PLACES_API_KEY_HERE';

  /* ───────────────────────────────────────────────
     STATIC LIST — worldwide
  ─────────────────────────────────────────────── */
  const LOCATIONS = {
    "Western Cape": [
      "Cape Town CBD","Sea Point","Green Point","Bo-Kaap","V&A Waterfront","Gardens",
      "Observatory","Woodstock","Salt River","De Waterkant","Claremont","Rondebosch",
      "Newlands","Kenilworth","Wynberg","Tokai","Constantia","Plumstead","Bergvliet",
      "Hout Bay","Llandudno","Camps Bay","Clifton","Bellville","Parow","Goodwood",
      "Durbanville","Brackenfell","Kraaifontein","Khayelitsha","Mitchells Plain",
      "Athlone","Lansdowne","Ottery","Retreat","Table View","Bloubergstrand",
      "Milnerton","Stellenbosch","Franschhoek","Paarl","Worcester","George",
      "Knysna","Mossel Bay","Somerset West","Strand","Gordon's Bay","Hermanus"
    ],
    "Gauteng": [
      "Johannesburg CBD","Sandton","Rosebank","Melrose","Fourways","Midrand",
      "Randburg","Roodepoort","Soweto","Alexandra","Kempton Park","Edenvale",
      "Pretoria CBD","Hatfield","Arcadia","Menlyn","Brooklyn","Centurion",
      "Benoni","Boksburg","Springs","Germiston","Alberton","Vanderbijlpark"
    ],
    "KwaZulu-Natal": [
      "Durban CBD","Berea","Morningside","Musgrave","Umhlanga","Ballito",
      "Pinetown","Westville","Chatsworth","Hillcrest","Pietermaritzburg","Richards Bay"
    ],
    "Eastern Cape": [

    ],
    "Free State": ["Bloemfontein","Welkom","Bethlehem"],
    "Limpopo": ["Polokwane","Tzaneen","Louis Trichardt","Thohoyandou"],
    "Mpumalanga": ["Nelspruit (Mbombela)","Witbank (eMalahleni)","Middelburg","White River"],
    "North West": ["Rustenburg","Potchefstroom","Klerksdorp","Mahikeng"],
    "Northern Cape": ["Kimberley","Upington","Springbok"],
    "Zimbabwe": [
      "Harare CBD","Avondale","Borrowdale","Highlands","Greendale","Mabelreign",
      "Bulawayo","Gweru","Mutare","Masvingo","Kwekwe","Chinhoyi","Marondera"
    ],
    "Zambia": ["Lusaka","Kitwe","Ndola","Livingstone"],
    "Botswana": ["Gaborone","Francistown","Maun"],
    "Namibia": ["Windhoek","Swakopmund","Walvis Bay"],
    "Mozambique": ["Maputo","Beira","Nampula"],
    "Eswatini": ["Mbabane","Manzini"],
    "Lesotho": ["Maseru"],
    "Nigeria": ["Lagos","Abuja","Port Harcourt","Kano","Ibadan","Enugu"],
    "Kenya": ["Nairobi","Mombasa","Kisumu","Nakuru"],
    "Ghana": ["Accra","Kumasi","Tamale"],
    "Tanzania": ["Dar es Salaam","Arusha","Mwanza"],
    "Uganda": ["Kampala","Entebbe"],
    "Ethiopia": ["Addis Ababa"],
    "United Kingdom": [
      "London","Manchester","Birmingham","Leeds","Glasgow","Edinburgh",
      "Bristol","Liverpool","Sheffield","Cardiff","Belfast","Nottingham"
    ],
    "United States": [
      "New York","Los Angeles","Chicago","Houston","Miami","Atlanta",
      "Dallas","San Francisco","Washington DC","Boston","Seattle","Phoenix",
      "Philadelphia","Denver","Las Vegas","Orlando","Minneapolis","Detroit"
    ],
    "Canada": ["Toronto","Vancouver","Montreal","Calgary","Ottawa","Edmonton","Winnipeg"],
    "Australia": ["Sydney","Melbourne","Brisbane","Perth","Adelaide","Gold Coast","Canberra"],
    "New Zealand": ["Auckland","Wellington","Christchurch"],
    "Germany": ["Berlin","Munich","Hamburg","Frankfurt","Cologne","Stuttgart","Düsseldorf"],
    "France": ["Paris","Lyon","Marseille","Toulouse","Nice","Bordeaux","Lille"],
    "Netherlands": ["Amsterdam","Rotterdam","The Hague","Utrecht","Eindhoven"],
    "Belgium": ["Brussels","Antwerp","Ghent"],
    "Switzerland": ["Zurich","Geneva","Basel","Bern"],
    "Spain": ["Madrid","Barcelona","Valencia","Seville","Bilbao"],
    "Italy": ["Rome","Milan","Naples","Turin","Florence","Venice"],
    "Portugal": ["Lisbon","Porto","Faro"],
    "Sweden": ["Stockholm","Gothenburg","Malmö"],
    "Norway": ["Oslo","Bergen","Stavanger"],
    "Denmark": ["Copenhagen","Aarhus"],
    "Finland": ["Helsinki","Tampere"],
    "Poland": ["Warsaw","Krakow","Gdansk","Wroclaw"],
    "UAE": ["Dubai","Abu Dhabi","Sharjah","Ajman"],
    "Saudi Arabia": ["Riyadh","Jeddah","Mecca","Medina","Dammam"],
    "Qatar": ["Doha"],
    "Bahrain": ["Manama"],
    "Kuwait": ["Kuwait City"],
    "India": [
      "Mumbai","Delhi","Bangalore","Chennai","Hyderabad","Pune",
      "Kolkata","Ahmedabad","Jaipur","Surat","Lucknow","Chandigarh"
    ],
    "Pakistan": ["Karachi","Lahore","Islamabad","Faisalabad"],
    "Bangladesh": ["Dhaka","Chittagong"],
    "Sri Lanka": ["Colombo","Kandy"],
    "Singapore": ["Singapore"],
    "Malaysia": ["Kuala Lumpur","Penang","Johor Bahru","Kota Kinabalu"],
    "Indonesia": ["Jakarta","Bali","Surabaya","Bandung","Medan"],
    "Philippines": ["Manila","Cebu","Davao","Quezon City"],
    "Thailand": ["Bangkok","Chiang Mai","Pattaya","Phuket"],
    "Vietnam": ["Ho Chi Minh City","Hanoi","Da Nang"],
    "Hong Kong": ["Hong Kong"],
    "Japan": ["Tokyo","Osaka","Kyoto","Yokohama","Nagoya","Fukuoka","Sapporo"],
    "South Korea": ["Seoul","Busan","Incheon","Daegu"],
    "China": ["Shanghai","Beijing","Guangzhou","Shenzhen","Chengdu","Hangzhou"],
    "Brazil": ["São Paulo","Rio de Janeiro","Brasília","Salvador","Fortaleza","Curitiba"],
    "Argentina": ["Buenos Aires","Córdoba","Rosario","Mendoza"],
    "Colombia": ["Bogotá","Medellín","Cali","Barranquilla"],
    "Chile": ["Santiago","Valparaíso","Concepción"],
    "Mexico": ["Mexico City","Guadalajara","Monterrey","Cancún","Tijuana"],
    "Peru": ["Lima","Cusco","Arequipa"]
  };

  /* ───────────────────────────────────────────────
     GPS
  ─────────────────────────────────────────────── */
  let detectedCity = null;

  function startGPS() {
    if (!navigator.geolocation) { showGPSError(); return; }
    navigator.geolocation.getCurrentPosition(onSuccess, onFail, {
      timeout: 9000, maximumAge: 120000, enableHighAccuracy: false
    });
  }

  async function onSuccess(pos) {
    const { latitude: lat, longitude: lng } = pos.coords;

    if (API_KEY && API_KEY !== 'YOUR_GOOGLE_PLACES_API_KEY_HERE') {
      await reverseGeocodeGoogle(lat, lng);
      loadNearbyGoogle(lat, lng);
    } else {
      await reverseGeocodeOSM(lat, lng);
      loadNearbyStatic(lat, lng);
    }
  }

  function onFail() { showGPSError(); }

  async function reverseGeocodeGoogle(lat, lng) {
    try {
      const url = `https://maps.googleapis.com/maps/api/geocode/json?latlng=${lat},${lng}&result_type=locality|sublocality_level_1&key=${API_KEY}`;
      const d = await (await fetch(url)).json();
      if (d.results && d.results.length) {
        const r = d.results[0];
        const comp = r.address_components;
        const loc  = comp.find(c => c.types.includes('locality') || c.types.includes('sublocality_level_1'));
        const ctry = comp.find(c => c.types.includes('country'));
        showFound(loc ? loc.long_name : r.formatted_address.split(',')[0], ctry ? ctry.long_name : '');
      } else { showGPSError(); }
    } catch { showGPSError(); }
  }

  async function reverseGeocodeOSM(lat, lng) {
    try {
      const d = await (await fetch(
        `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`
      )).json();
      const city = d.address.city || d.address.town || d.address.village || d.address.county || 'Your area';
      const country = d.address.country || '';
      showFound(city, country);
    } catch { showGPSError(); }
  }

  async function loadNearbyGoogle(lat, lng) {
    try {
      const url = `https://maps.googleapis.com/maps/api/place/nearbysearch/json?location=${lat},${lng}&radius=40000&type=locality&key=${API_KEY}`;
      const d = await (await fetch(url)).json();
      if (d.results && d.results.length) {
        const cities = d.results.slice(0, 7).map(p => ({
          name: p.name,
          dist: haversine(lat, lng, p.geometry.location.lat, p.geometry.location.lng)
        }));
        renderNearby(cities);
      }
    } catch {}
  }

  function loadNearbyStatic(lat, lng) {
    const COORDS = {
      "Cape Town CBD":[-33.9249,18.4241],"Sea Point":[-33.9188,18.3927],
      "Claremont":[-33.9810,18.4617],"Bellville":[-33.8988,18.6303],
      "Stellenbosch":[-33.9321,18.8602],"Somerset West":[-34.0786,18.8494],
      "Johannesburg CBD":[-26.2041,28.0473],"Sandton":[-26.1070,28.0567],
      "Pretoria CBD":[-25.7479,28.2293],"Centurion":[-25.8601,28.1890],
      "Durban CBD":[-29.8587,31.0218],"Umhlanga":[-29.7243,31.0816],
      "Harare CBD":[-17.8252,31.0335],"Bulawayo":[-20.1325,28.6262],
      "Lusaka":[-15.4166,28.2833],"Gaborone":[-24.6282,25.9231],
      "Windhoek":[-22.5597,17.0832],"Maputo":[-25.9692,32.5732],
      "Nairobi":[-1.2921,36.8219],"Lagos":[6.5244,3.3792],
      "Accra":[5.6037,-0.1870],"Dar es Salaam":[-6.7924,39.2083],
      "Kampala":[0.3476,32.5825],"Addis Ababa":[9.0320,38.7469],
      "London":[51.5074,-0.1278],"Manchester":[53.4808,-2.2426],
      "New York":[40.7128,-74.0060],"Los Angeles":[34.0522,-118.2437],
      "Chicago":[41.8781,-87.6298],"Toronto":[43.6532,-79.3832],
      "Sydney":[-33.8688,151.2093],"Melbourne":[-37.8136,144.9631],
      "Dubai":[25.2048,55.2708],"Mumbai":[19.0760,72.8777],
      "Singapore":[1.3521,103.8198],"Tokyo":[35.6762,139.6503],
      "Seoul":[37.5665,126.9780],"São Paulo":[-23.5505,-46.6333]
    };
    const results = Object.entries(COORDS)
      .map(([name, c]) => ({ name, dist: haversine(lat, lng, c[0], c[1]) }))
      .sort((a, b) => a.dist - b.dist)
      .slice(0, 7);
    renderNearby(results);
  }

  function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371, dL = (lat2-lat1)*Math.PI/180, dN = (lon2-lon1)*Math.PI/180;
    const a = Math.sin(dL/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dN/2)**2;
    return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
  }

  function showFound(city, country) {
    detectedCity = city;
    document.getElementById('gpsDetecting').style.display = 'none';
    document.getElementById('gpsFound').style.display = 'block';
    document.getElementById('gpsCityName').textContent = city;
    document.getElementById('gpsCountry').textContent = country ? country + '  ·  Tap to confirm' : 'Tap to confirm';
  }

  function showGPSError() {
    document.getElementById('gpsDetecting').style.display = 'none';
    document.getElementById('gpsError').style.display = 'block';
  }

  function confirmGPS() {
    if (detectedCity) pick(detectedCity);
  }

  function renderNearby(cities) {
    const wrap = document.getElementById('nearbyWrap');
    const list = document.getElementById('nearbyList');
    list.innerHTML = '';
    cities.forEach(c => {
      const el = document.createElement('div');
      el.className = 'loc-item';
      el.innerHTML = `
        <span class="loc-name">${c.name}</span>
        <span class="loc-meta">${c.dist < 2 ? 'Near you' : c.dist + ' km'}</span>
      `;
      el.onclick = () => pick(c.name);
      list.appendChild(el);
    });
    wrap.style.display = 'block';
  }

  /* ───────────────────────────────────────────────
     Static list + search
  ─────────────────────────────────────────────── */
  function buildList(q) {
    const content = document.getElementById('content');
    const noResults = document.getElementById('noResults');
    const filter = (q || '').toLowerCase().trim();
    content.innerHTML = '';
    let total = 0;

    for (const [region, cities] of Object.entries(LOCATIONS)) {
      const matched = filter ? cities.filter(c => c.toLowerCase().includes(filter)) : cities;
      if (!matched.length) continue;
      total += matched.length;
      const lbl = document.createElement('div');
      lbl.className = 'section-label';
      lbl.textContent = region;
      content.appendChild(lbl);
      matched.forEach(city => {
        const el = document.createElement('div');
        el.className = 'loc-item';
        el.innerHTML = `<span class="loc-name">${city}</span><span class="loc-arrow">›</span>`;
        el.onclick = () => pick(city);
        content.appendChild(el);
      });
    }

    noResults.style.display = total === 0 ? 'block' : 'none';
    content.style.display = total === 0 ? 'none' : 'block';
  }

  function filterLocations(val) { buildList(val); }

  function pick(city) {
    localStorage.setItem('sn_location', city);
    document.body.classList.remove('visible');
    document.body.classList.add('out');
    setTimeout(() => window.location.href = 'category.html', 350);
  }

  function goBack() {
    document.body.classList.remove('visible');
    document.body.classList.add('out');
    setTimeout(() => window.location.href = 'index.html', 350);
  }

  window.addEventListener('pageshow', () => {
    document.body.classList.remove('out');
    document.body.classList.add('visible');
  });

  window.addEventListener('load', () => {
    document.body.classList.add('visible');
    buildList('');
    startGPS();
  });
</script>
</body>
</html>

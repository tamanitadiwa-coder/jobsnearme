<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Category — StoresNearm</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

.topbar {
  padding: 15px;
  background: white;
  border-bottom: 1px solid #ddd;
}

.content {
  padding: 10px;
}

.cat-card {
  background: white;
  margin: 10px 0;
  padding: 15px;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="goBack()">Back</button>
  <h3>What are you looking for?</h3>
</div>

<div id="content" class="content"></div>

<script>
const CATEGORIES = [
  { label: "Restaurants", key: "restaurant" },
  { label: "Cafes", key: "cafe" },
  { label: "Supermarkets", key: "supermarket" },
  { label: "Pharmacies", key: "pharmacy" }
];

function buildCategories() {
  const content = document.getElementById("content");

  CATEGORIES.forEach(cat => {
    const div = document.createElement("div");
    div.className = "cat-card";
    div.innerText = cat.label;

    div.onclick = () => {
      alert("Clicked: " + cat.label);
    };

    content.appendChild(div);
  });
}

function goBack() {
  window.location.href = "location.html";
}

window.onload = () => {
  console.log("PAGE WORKING");
  buildCategories();
};
</script>

</body>
</html>
